<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MKSPC Monitors</title>

    <link rel="stylesheet" href="cola.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/Makio_Face.png">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container header-content">

    <div class="logo">
      <a href="index.html"><img src="assets/img/MKSPC_logo.png" alt="logo"></a>
    </div>  

    <nav id="nav" class="nav">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="marcas.html">Horario</a></li>
        <li><a href="#inicio">Impresiones en cola</a></li>
        <li><a href="productos.html">Filamentos</a></li>
      </ul>
    </nav>

    <div class="redes">
      <i class="fa-solid fa-user"></i>
      
    </div>

    <button class="menu-toggle" type="button" aria-label="Abrir menu de navegacion" aria-expanded="false" aria-controls="nav">
      <i class="fa-solid fa-bars"></i>
    </button>

  </div>
</header>

<!--  -->

<main>

<!-- HERO -->
<section id="inicio">
  <div class="container hero">
    <h1>IMPRESIONES EN COLA</h1>
    
  </div>
</section>

<!-- CONTENIDO -->
<section class="contenido">
  <div class="container">
    <div class="queue-sketch">
      <div class="queue-heading">
        <p class="eyebrow">Cola de Espera MakerSpace</p>
        
      </div>

      <div class="queue-board-wrapper">
        <div class="queue-board" id="queueBoard" aria-live="polite">
         
        </div>
      </div>

      <div class="queue-controls">
        <div class="queue-form">
          <label>
            Color:
            <input type="color" id="cardColor" value="#24b4d1">
          </label>

          <label>
            Nombre del propietario
            <input type="text" id="ownerName" placeholder="Ej: Juan Perez">
          </label>

          <label>
            Nombre de la impresion
            <input type="text" id="printName" placeholder="Ej: Base para celular">
          </label>
        </div>

        <button class="queue-add-btn" id="addQueueCard" type="button">
          Anadir impresión 
        </button>
      </div>
    </div>

  </div>
</section>
</main>
<!-- FOOTER -->
<footer>
  <div class="logo-footer">
      <img src="assets/img/MKSPC_logo.png" alt="logo">
    </div>
  
</footer>

<script  type="module" src="cola.js"></script> 
</body>
</html>
